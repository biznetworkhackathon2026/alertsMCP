---
applications:
  - name: alerts-mcp
    memory: 256M
    disk_quota: 512M
    buildpacks:
      - nodejs_buildpack
    command: node dist/mcp-server.js
    health-check-type: http
    health-check-http-endpoint: /
    instances: 1
    routes:
      - route: biznetworkhackathon2026-alerts-mcp.cfapps.us10-001.hana.ondemand.com
    env:
      NODE_ENV: production
